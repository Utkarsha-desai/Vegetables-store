{% extends 'base/base.html' %}
{% block content %}

<section class="ftco-section">
  <div class="container">
    <div class="row">

      <div class="col-md-6">
        <img src="{{ product.photo.url }}" class="img-fluid">
      </div>

      <div class="col-md-6">
        <h2>{{ product.name }}</h2>
        <h4>₹{{ product.price }}</h4>
        <p>{{ product.details }}</p>

        <a href="{% url 'add-to-cart' product.id %}"
           class="btn btn-primary">
           Add to Cart
        </a>
      </div>

    </div>

    <hr>

    <h4>Related Products</h4>
    <div class="row">
      {% for rp in related_products %}
      <div class="col-md-3 text-center">
        <a href="{% url 'product-details' rp.id %}">
          <img src="{{ rp.photo.url }}" class="img-fluid" style="height:120px;">
          <p>{{ rp.name }}</p>
        </a>
      </div>
      {% endfor %}
    </div>

  </div>
</section>

{% endblock %}
