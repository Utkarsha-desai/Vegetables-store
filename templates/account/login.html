<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | SmartVegNet</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body{
            min-height:100vh;
            background:
                linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
                url("/static/images/image_5.jpg");
            background-size:cover;
            background-position:center;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .login-box{
            width:380px;
            padding:35px;
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(10px);
            border-radius:15px;
            box-shadow:0 15px 35px rgba(0,0,0,0.5);
            color:#fff;
        }

        .login-box h2{
            text-align:center;
            margin-bottom:25px;
            letter-spacing:1px;
        }

        .login-box label{
            font-size:14px;
        }

        .login-box input{
            width:100%;
            padding:12px;
            margin:8px 0 18px;
            border:none;
            border-radius:8px;
            outline:none;
        }

        .login-box button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#28a745;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .login-box button:hover{
            background:#1e7e34;
            transform:scale(1.03);
        }

        .login-footer{
            text-align:center;
            margin-top:15px;
            font-size:14px;
        }

        .login-footer a{
            color:#00ffae;
            text-decoration:none;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Username</label>
        {{ form.username }}

        <label>Password</label>
        {{ form.password }}

        <button type="submit">Login</button>
    </form>

    <div class="login-footer">
        Don’t have an account?
        <a href="{% url 'register' %}">Register</a>
    </div>
</div>

</body>
</html>
